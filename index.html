<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PedidosOficina</title>
  <link rel="icon" href="favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── LOGIN ── -->
<div id="screen-login" class="screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-top">
        <div class="login-logo">🎂</div>
        <h1>PedidosOficina</h1>
        <p>Ingresa tu RUT para continuar</p>
      </div>
      <div class="login-body">
        <input type="text" id="rut-input" placeholder="Ej: 12.345.678-9" maxlength="12" autocomplete="off" />
        <div id="login-error" class="error-msg hidden">RUT no encontrado.</div>
        <button id="btn-login" class="btn-accent">Entrar</button>
      </div>
    </div>
  </div>
</div>

<!-- ── APP USUARIO ── -->
<div id="screen-app" class="screen hidden">
  <header class="app-bar">
    <div class="app-bar-left">
      <span>🎂</span>
      <span class="app-bar-title">PedidosOficina</span>
    </div>
    <div class="app-bar-right">
      <span id="header-username" class="app-bar-user"></span>
      <button id="btn-logout" class="btn-ghost-sm">Salir</button>
    </div>
  </header>

  <!-- HOME -->
  <div id="section-home" class="section">
    <!-- Cumpleaños card -->
    <div id="cumple-card" class="cumple-card">
      <div id="cumple-info"></div>
      <button id="btn-ir-a-pedir" class="btn-accent hidden">Ver menú →</button>
      <div id="siguiente-cumple" class="sig-cumple hidden"></div>
    </div>

    <!-- Pedido pendiente -->
    <div id="section-pendiente" class="home-section hidden">
      <div class="home-section-title">💳 Pedido pendiente</div>
      <div class="pend-card">
        <div class="pend-info">
          <div class="pend-local" id="pend-local"></div>
          <div class="pend-fecha" id="pend-fecha"></div>
        </div>
        <div class="pend-right">
          <div class="pend-total" id="pend-total"></div>
          <button id="btn-ver-pendiente" class="btn-outline-sm">Ver detalle</button>
        </div>
      </div>
    </div>

    <!-- Historial -->
    <div id="section-historial" class="home-section hidden">
      <div class="home-section-title">🕐 Pedidos anteriores</div>
      <div id="historial-lista"></div>
    </div>
  </div>

  <!-- LOCALES -->
  <div id="section-locales" class="section hidden">
    <div class="section-header">
      <button id="btn-volver-home" class="btn-back">← Volver</button>
      <h2>¿Dónde pedimos?</h2>
    </div>
    <div id="lista-locales"></div>
  </div>

  <!-- MENÚ -->
  <div id="section-menu" class="section hidden">
    <div class="section-header">
      <button id="btn-volver-locales" class="btn-back">← Volver</button>
      <h2 id="menu-titulo"></h2>
    </div>
    <div id="menu-cats" class="cats-bar"></div>
    <div id="menu-items" class="menu-lista"></div>
    <div style="height:90px"></div>
  </div>

  <!-- FAB carrito -->
  <div id="carrito-fab" class="carrito-fab hidden">
    <span class="fab-icon">🛒</span>
    <span id="fab-count" class="fab-count">0</span>
    <span class="fab-sep">·</span>
    <span id="fab-total" class="fab-total">$0</span>
  </div>
</div>

<!-- MODAL ítem -->
<div id="modal-item" class="modal-overlay hidden">
  <div class="modal-sheet">
    <button id="btn-cerrar-item" class="modal-x">✕</button>
    <div id="mi-emoji" class="modal-emoji"></div>
    <h3 id="mi-nombre" class="modal-titulo"></h3>
    <p id="mi-desc" class="modal-desc"></p>
    <p id="mi-precio" class="modal-precio"></p>
    <label class="modal-label">Comentario (opcional)</label>
    <input id="mi-comentario" type="text" class="modal-input" placeholder="Ej: sin mayonesa, extra palta..." maxlength="100" />
    <div class="qty-row">
      <button id="btn-qty-menos" class="qty-btn">−</button>
      <span id="mi-qty" class="qty-val">1</span>
      <button id="btn-qty-mas" class="qty-btn">+</button>
    </div>
    <button id="btn-agregar-item" class="btn-accent">Agregar al pedido</button>
  </div>
</div>

<!-- MODAL carrito -->
<div id="modal-carrito" class="modal-overlay hidden">
  <div class="modal-sheet">
    <button id="btn-cerrar-carrito" class="modal-x">✕</button>
    <h3 class="modal-titulo">Mi pedido</h3>
    <div id="carrito-lista" class="carrito-lista"></div>
    <div class="carrito-footer">
      <span>Total</span>
      <span id="carrito-total" class="carrito-total-val">$0</span>
    </div>
    <button id="btn-confirmar-pedido" class="btn-accent">Confirmar pedido</button>
  </div>
</div>

<!-- MODAL detalle -->
<div id="modal-detalle" class="modal-overlay hidden">
  <div class="modal-sheet">
    <button id="btn-cerrar-detalle" class="modal-x">✕</button>
    <h3 id="det-titulo" class="modal-titulo"></h3>
    <p id="det-fecha" class="modal-desc"></p>
    <div id="det-lista" class="det-lista"></div>
    <div class="carrito-footer">
      <span>Total</span>
      <span id="det-total" class="carrito-total-val">$0</span>
    </div>
  </div>
</div>

<!-- ── ADMIN ── -->
<div id="screen-admin" class="screen hidden">
  <header class="app-bar admin-bar">
    <div class="app-bar-left"><span>⚙️</span><span class="app-bar-title">Admin</span></div>
    <div class="app-bar-right"><button id="btn-admin-logout" class="btn-ghost-sm danger">Salir</button></div>
  </header>
  <div class="admin-tabs">
    <button class="admin-tab active" data-tab="pedidos">Pedidos</button>
    <button class="admin-tab" data-tab="cumples">Cumpleaños</button>
    <button class="admin-tab" data-tab="usuarios">Usuarios</button>
    <button class="admin-tab" data-tab="menu">Menú</button>
  </div>
  <div id="tab-pedidos" class="admin-panel" style="display:block">
    <div class="admin-panel-header" style="display:flex">
      <h2>Pedidos del día</h2><span id="pedidos-fecha" class="fecha-badge"></span>
    </div>
    <div id="pedidos-lista" class="pedidos-grid"></div>
    <div id="pedidos-vacio" class="vacio-msg hidden">No hay pedidos aún.</div>
  </div>
  <div id="tab-cumples" class="admin-panel" style="display:none">
    <div class="admin-panel-header" style="display:flex">
      <h2>Cumpleaños</h2><button id="btn-nuevo-cumple" class="btn-accent small">+ Agregar</button>
    </div>
    <div id="form-cumple" class="admin-form hidden">
      <input type="text" id="cumple-nombre" placeholder="Nombre completo" />
      <input type="date" id="cumple-fecha" />
      <div class="form-actions">
        <button id="btn-guardar-cumple" class="btn-accent small">Guardar</button>
        <button id="btn-cancelar-cumple" class="btn-ghost-sm">Cancelar</button>
      </div>
    </div>
    <div id="cumples-lista" class="cumples-grid"></div>
  </div>
  <div id="tab-usuarios" class="admin-panel" style="display:none">
    <div class="admin-panel-header" style="display:flex">
      <h2>Usuarios</h2><button id="btn-nuevo-usuario" class="btn-accent small">+ Agregar</button>
    </div>
    <div id="form-usuario" class="admin-form hidden">
      <input type="text" id="usuario-nombre" placeholder="Nombre completo" />
      <input type="text" id="usuario-rut" placeholder="RUT (ej: 12.345.678-9)" maxlength="12" />
      <div class="form-actions">
        <button id="btn-guardar-usuario" class="btn-accent small">Guardar</button>
        <button id="btn-cancelar-usuario" class="btn-ghost-sm">Cancelar</button>
      </div>
    </div>
    <div id="usuarios-lista" class="usuarios-grid"></div>
  </div>
  <div id="tab-menu" class="admin-panel" style="display:none">
    <div class="admin-panel-header" style="display:flex">
      <h2>Menú Fuente Alemana</h2><button id="btn-importar-menu" class="btn-accent small">Importar menú</button>
    </div>
    <div id="import-status" class="import-status hidden"></div>
    <div id="menu-admin-lista" class="menu-admin-grid"></div>
  </div>
</div>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/utils.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/cumples.js"></script>
<script type="module" src="js/menu.js"></script>
<script type="module" src="js/pedidos.js"></script>
<script type="module" src="js/admin.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
