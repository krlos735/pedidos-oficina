<body>
  <h2>🚀 Carga inicial — PedidosOficina</h2>
  <p>Este script carga todos los usuarios y cumpleaños a Firestore.</p>
  <button id="btn-cargar">Cargar usuarios y cumpleaños</button>
  <div id="log"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, writeBatch, doc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD5uXXbG0Quhg0Fqbg8K02UpfxAe8oX0hw",

  projectId: "pedidos-oficina-d34f9",
  storageBucket: "pedidos-oficina-d34f9.firebasestorage.app",
  messagingSenderId: "719565975842",
  appId: "1:719565975842:web:d7cfbcdf1469381977757b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function log(msg, tipo = 'info') {
  const el = document.getElementById('log');
  el.innerHTML += `<div class="${tipo}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

function primerNombre(nombreCompleto) {
  const partes = nombreCompleto.trim().split(' ');
  // Capitaliza primera letra
  return partes[0].charAt(0) + partes[0].slice(1).toLowerCase();
}

function cleanRut(rut) {
  return rut.replace(/[^0-9kK]/g, '').toUpperCase();
}

const personas = [

document.getElementById('btn-cargar').addEventListener('click', async () => {
  const btn = document.getElementById('btn-cargar');
  btn.disabled = true;
  log('Iniciando carga...', 'info');

  let usuariosOk = 0, cumlesOk = 0, errores = 0;

  for (const p of personas) {
    const rutClean = cleanRut(p.rut);
    const nombreMostrar = primerNombre(p.nombre);
    try {
      // Verificar si ya existe
      const q = query(collection(db, 'usuarios'), where('rutClean', '==', rutClean));
      const snap = await getDocs(q);
      if (!snap.empty) {
        log(`⚠ Ya existe: ${nombreMostrar} (${p.rut})`, 'info');
      } else {
        await addDoc(collection(db, 'usuarios'), {
          nombre: nombreMostrar,
          nombreCompleto: p.nombre,
          rutClean,
          rol: 'usuario'
        });
        log(`✓ Usuario: ${nombreMostrar} — ${p.rut}`, 'ok');
        usuariosOk++;
      }
    } catch(e) {
      log(`✗ Error usuario ${p.nombre}: ${e.message}`, 'err');
      errores++;
    }

    // Cumpleaños solo si tiene fecha
    if (p.fecha) {
      const [dia, mes] = p.fecha.split('/').map(Number);
      try {
        await addDoc(collection(db, 'cumpleanos'), {
          nombre: nombreMostrar,
          nombreCompleto: p.nombre,
          dia,
          mes
        });
        log(`🎂 Cumpleaños: ${nombreMostrar} — ${dia}/${mes}`, 'ok');
        cumlesOk++;
      } catch(e) {
        log(`✗ Error cumpleaños ${p.nombre}: ${e.message}`, 'err');
        errores++;
      }
    }
  }

  log(``, 'info');
  log(`✅ Listo: ${usuariosOk} usuarios, ${cumlesOk} cumpleaños cargados. ${errores} errores.`, 'ok');
  btn.textContent = '✓ Carga completada';
});
</script>
</body>
